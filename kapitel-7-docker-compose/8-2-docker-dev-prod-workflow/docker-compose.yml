version: "3"

services:
  app:
    build:
      context: .
      args:
        - NODE_ENV=${NODE_ENV:-development}
    image: myapp/backend:${TAG:-latest}
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - DB_NAME=${DB_NAME:-mydb}
    volumes:
      - ./src:/app/src
    command: ${COMMAND:-npm run dev}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=${DB_USER:-myuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-mypassword}
      - POSTGRES_DB=${DB_NAME:-mydb}
    volumes:
      - ${DB_VOLUME:-postgres-data}:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"

  migration:
    build:
      context: .
    command: npm run migrate
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - DB_NAME=${DB_NAME:-mydb}
    depends_on:
      - db

  test:
    build:
      context: .
      args:
        - NODE_ENV=test
    command: npm test
    environment:
      - NODE_ENV=test
      - DB_HOST=db
      - DB_USER=${DB_USER:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - DB_NAME=${DB_NAME:-test}
    depends_on:
      - db

volumes:
  postgres-data: